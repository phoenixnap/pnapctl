name: Release workflow

on:
  release:
    types:
      - published
      - edited

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    container: golang:1.23
    steps:
      - name: Update git config
        run: git config --global --add safe.directory '*'
      - name: Checkout the repo
        uses: actions/checkout@v2
      - name: Go Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Run tests
        run: make test-coverage
      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results
          path: 'out/unit-tests/*'

  component-tests:
    name: Component Tests
    runs-on: ubuntu-latest
    container: golang:1.23
    steps:
      - name: Update git config
        run: git config --global --add safe.directory '*'
      - name: Checkout the repo
        uses: actions/checkout@v2
      - name: Install node
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install bats
        run: npm install -g bats
      - name: Go Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Run tests
        run: make component-tests
      - name: Upload Component Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Component Test Results
          path: 'out/component-tests/*'

  publish-test-results:
    name: Publish Test Results
    needs:
      - unit-tests
      - component-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v1
        with:
          files: test-results/**/*.xml
          check_name: "Test Results"

  build-artifacts:
    name: Build Artifacts
    needs:
      - unit-tests
      - component-tests
    runs-on: ubuntu-latest
    container: golang:1.23
    steps:
      - name: Update git config
        run: git config --global --add safe.directory '*'
      - name: Install zip
        run: apt-get update && apt-get install -y zip
      - name: Checkout the repo
        uses: actions/checkout@v2
      - name: Build and Pack
        run: make build-and-pack
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: build/dist

  publish-release-assets:
    name: Publish Release Assets
    needs:
      - build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      - name: Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/pnapctl-darwin-amd64.tar.gz
            dist/pnapctl-linux-amd64.tar.gz
            dist/pnapctl-windows-amd64.zip

  updateLatestTag:
    name: Update Latest Tag Test
    needs:
      - publish-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v2
      - name: Update Latest Tag
        uses: Actions-R-Us/actions-tagger@latest
        with:
          publish_latest_tag: true

  publish-image:
    name: Publish Image
    needs:
      - publish-release-assets
      - updateLatestTag
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            PNAPCTL_VERSION=${{ github.event.release.tag_name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pnapctl:latest
            ghcr.io/${{ github.repository_owner }}/pnapctl:${{ github.event.release.tag_name }}

  run-e2e:
    name: E2E Tests
    needs: publish-image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/pnapctl:latest

      - name: Run E2E tests
        run: mvn test
        working-directory: e2e-tests
        env:
          PNAPCTL_IMAGE: ghcr.io/${{ github.repository_owner }}/pnapctl:latest
          PNAPCTL_VERSION: ${{ github.event.release.tag_name }}
          PNAP_CLIENT_ID: ${{ secrets.PNAP_CLIENT_ID }}
          PNAP_CLIENT_SECRET: ${{ secrets.PNAP_CLIENT_SECRET }}