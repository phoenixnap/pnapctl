name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
      timezone: 'Europe/Belgrade'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate tag
        id: vars
        run: echo "tag=$(date +%d-%m-%Y)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          no-cache: true
          build-args: |
            PNAPCTL_VERSION=${{ github.event.release.tag_name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pnapctl:latest
            ghcr.io/${{ github.repository_owner }}/pnapctl:${{ github.event.release.tag_name }}
      - name: Delete old container versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: pnapctl
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false