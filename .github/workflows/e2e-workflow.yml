name: E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-  

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/pnapctl:latest

      - name: Run E2E tests
        run: mvn test
        working-directory: e2e-tests
        env:
          PNAPCTL_IMAGE: ghcr.io/${{ github.repository_owner }}/pnapctl:latest
          PNAPCTL_VERSION: ${{ github.event.release.tag_name }}
          PNAP_CLIENT_ID: ${{ secrets.PNAP_CLIENT_ID }}
          PNAP_CLIENT_SECRET: ${{ secrets.PNAP_CLIENT_SECRET }}